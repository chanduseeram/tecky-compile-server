services:
  - type: web
    name: tecky-compile-server
    runtime: python
    buildCommand: pip install -r requirements.txt && curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | BINDIR=/opt/arduino-cli sh && /opt/arduino-cli/arduino-cli core update-index && /opt/arduino-cli/arduino-cli core install arduino:avr
    startCommand: python server.py
    plan: free
